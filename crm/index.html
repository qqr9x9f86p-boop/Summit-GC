<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M.A.Y.A CRM — Summit GC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="crm.css" />
  <style>body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>

  <!-- ① Brand config (fills in Firebase creds + accent color) -->
  <script src="config.js"></script>

  <!-- ② Firebase v10 compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <!-- ③ Initialize Firebase → exposes window.fbDb -->
  <script src="firebase-init.js"></script>
</head>
<body>

<div class="app-shell">

  <!-- ── Top bar ─────────────────────────────────────────── -->
  <header class="top-bar">
    <div class="top-bar-brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Summit GC</div>
        <div class="brand-sub">M.A.Y.A CRM</div>
      </div>
    </div>
    <div class="top-bar-right">
      <span class="back-link" id="firebase-status">● Live</span>
    </div>
  </header>

  <!-- ── Sub-nav ─────────────────────────────────────────── -->
  <nav class="sub-nav">
    <button class="nav-item active" data-view="dashboard">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      Dashboard
    </button>
    <button class="nav-item" data-view="records">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Pipeline
      <span class="nav-badge hidden" id="badge-new">0</span>
    </button>
    <button class="nav-item" data-view="audit">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Audit Log
    </button>
    <button class="nav-item" data-view="jobs">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
      Jobs
    </button>
    <button class="nav-item" data-view="calendar">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendar
    </button>
  </nav>

  <!-- ── Main ────────────────────────────────────────────── -->
  <main class="main">
    <div class="main-head">
      <h2 id="main-head-title">Dashboard</h2>
      <div class="view-actions" id="view-actions"></div>
    </div>
    <div class="view-root" id="view-root"></div>
  </main>

</div>

<div id="modal-root" class="hidden" aria-live="polite"></div>
<div id="toast-root" aria-live="polite" aria-atomic="true"></div>

<script src="jobs.js"></script>
<script src="calendar.js"></script>
<script src="crm.js"></script>
</body>
</html>
